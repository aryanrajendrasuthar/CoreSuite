spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:inventory_service}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    table: flyway_schema_history_inventory

coresuite:
  gateway-secret: ${GATEWAY_SECRET:local-dev-gateway-secret-change-me}

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info
