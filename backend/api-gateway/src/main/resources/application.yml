spring:
  application:
    name: api-gateway
  # shared brings spring-security-web/-core transitively (for the servlet
  # filter/Argon2 code the other, non-reactive services use) which otherwise
  # triggers Spring Boot's default reactive security auto-config here even
  # though nothing in this app uses it — no real filter chain gets built
  # (that needs spring-security-config, which isn't on this classpath), but
  # it logs a confusing "generated security password" on every boot.
  # AuthenticationGatewayFilter is the only thing actually enforcing auth.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:auth_service}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    table: flyway_schema_history_auth
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    gateway:
      routes:
        - id: product-service
          uri: http://${PRODUCT_SERVICE_HOST:localhost}:${PRODUCT_SERVICE_PORT:8081}
          predicates:
            - Path=/api/products/**,/api/variants/**
        - id: crm-service
          uri: http://${CRM_SERVICE_HOST:localhost}:${CRM_SERVICE_PORT:8082}
          predicates:
            - Path=/api/customers/**,/api/segments/**
        - id: inventory-service
          uri: http://${INVENTORY_SERVICE_HOST:localhost}:${INVENTORY_SERVICE_PORT:8083}
          predicates:
            - Path=/api/warehouses/**,/api/stock/**
        - id: order-service
          uri: http://${ORDER_SERVICE_HOST:localhost}:${ORDER_SERVICE_PORT:8084}
          predicates:
            - Path=/api/orders/**
        - id: reporting-service
          uri: http://${REPORTING_SERVICE_HOST:localhost}:${REPORTING_SERVICE_PORT:8085}
          predicates:
            - Path=/api/reports/**
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            allowedHeaders: "*"
            allowCredentials: true

coresuite:
  gateway-secret: ${GATEWAY_SECRET:local-dev-gateway-secret-change-me}
  # Base64-encoded 32-byte AES-256 key used to encrypt TOTP secrets at rest.
  # Local-dev-only default below; a real deployment must set a unique value
  # (see SECURITY.md "Secrets to change before any real deployment").
  field-encryption-key: ${FIELD_ENCRYPTION_KEY:BApYw3nAmSTPXl9ECJF55PTrXOQZLdjb/OpLGZnd9m4=}
  totp:
    issuer: CoreSuite

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
