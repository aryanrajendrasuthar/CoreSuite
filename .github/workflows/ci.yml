name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  backend-build:
    name: Backend build & test
    runs-on: ubuntu-latest
    env:
      # Testcontainers' Ryuk reaper watches a heartbeat from the test JVM and
      # kills containers if it lags — on throttled/busy CI runners this fires
      # false positives mid-suite (MySQL container dies between test classes
      # with "Communications link failure"). The runner VM is destroyed after
      # the job regardless, so leftover containers aren't a real risk here.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build and test
        working-directory: backend
        run: mvn -B clean verify

  frontend-build:
    name: Frontend build & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/dashboard/package-lock.json
      - name: Install dependencies
        working-directory: frontend/dashboard
        run: npm ci
      - name: Lint
        working-directory: frontend/dashboard
        run: npm run lint
      - name: Build
        working-directory: frontend/dashboard
        run: npm run build

  dependency-check:
    name: OWASP dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OWASP Dependency-Check (backend)
        uses: dependency-check/Dependency-Check_Action@main
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        with:
          project: coresuite-backend
          path: backend
          format: HTML
          args: --failOnCVSS 9 --enableRetired
      - name: Frontend dependency audit
        working-directory: frontend/dashboard
        run: npm audit --audit-level=critical
      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports

  secret-scan:
    name: Secret scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: actions/setup-java@v4
        if: matrix.language == 'java-kotlin'
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build backend
        if: matrix.language == 'java-kotlin'
        working-directory: backend
        run: mvn -B clean install -DskipTests
      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
